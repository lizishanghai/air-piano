<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Piano - 空中钢琴</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loader">
      <div class="spinner"></div>
      <p id="loading-text">正在加载模型...</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="controls">
      <div class="control-group">
        <label>音色</label>
        <select id="instrument-select">
          <option value="piano">钢琴</option>
          <option value="electric-piano">电钢琴</option>
          <option value="organ">风琴</option>
        </select>
      </div>

      <div class="control-group">
        <button id="sustain-btn" class="toggle-btn">延音</button>
      </div>

      <div class="control-group recording-controls">
        <button id="record-btn" class="action-btn">录制</button>
        <button id="play-btn" class="action-btn" disabled>回放</button>
        <button id="export-btn" class="action-btn" disabled>导出</button>
        <input type="file" id="import-input" accept=".json" class="hidden">
        <button id="import-btn" class="action-btn">导入</button>
      </div>

      <div class="control-group">
        <button id="teach-btn" class="toggle-btn">教学</button>
        <select id="song-select" class="hidden">
          <option value="twinkle">小星星</option>
          <option value="ode-to-joy">欢乐颂</option>
          <option value="mary">玛丽有只小羊羔</option>
        </select>
      </div>
    </div>

    <div id="status-bar">
      <span id="fps-display">FPS: --</span>
      <span id="hands-display">手: 0</span>
      <span id="mode-display"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
